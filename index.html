<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>TikTok Video Downloader</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background: radial-gradient(circle at top, #0f0f0f, #000000);
}

.glow{
box-shadow:0 0 20px #ff0050, 0 0 40px #00f2ea;
}

.loader{
border:4px solid #222;
border-top:4px solid #00f2ea;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
</style>

</head>

<body class="text-white flex items-center justify-center min-h-screen">

<div class="text-center w-full max-w-xl">

<h1 class="text-4xl font-bold mb-10">
TikTok Video Downloader
</h1>

<div class="flex gap-3">

<input id="url"
class="w-full p-4 rounded-lg bg-black border border-pink-500 focus:outline-none"
placeholder="TikTok linkini yapıştır">

<button onclick="getVideo()"
class="px-6 py-4 bg-pink-500 rounded-lg font-semibold hover:bg-pink-600 glow">
İndir
</button>

</div>

<div id="loading" class="hidden mt-10 flex justify-center">
<div class="loader"></div>
</div>

<div id="result" class="mt-10 hidden">

<img id="thumb" class="rounded-xl mx-auto mb-5 w-64">

<a id="downloadBtn"
class="bg-cyan-400 text-black px-6 py-3 rounded-lg font-bold hover:bg-cyan-300">
Filigransız MP4 İndir
</a>

</div>

</div>

<script>

/*
---------------------------------------
API AYARLARI
---------------------------------------

RapidAPI'den bir TikTok Downloader API seç.

Sonra:

1️⃣ RapidAPI'den API Key al
2️⃣ Aşağıdaki API_KEY değişkenine ekle

Örnek RapidAPI endpoint:

https://tiktok-video-no-watermark2.p.rapidapi.com/

*/

const API_KEY = ""   // BURAYA RAPIDAPI KEY GELECEK

async function getVideo(){

const url = document.getElementById("url").value

document.getElementById("loading").classList.remove("hidden")
document.getElementById("result").classList.add("hidden")

try{

const response = await fetch(
`https://tiktok-video-no-watermark2.p.rapidapi.com/?url=${url}&hd=1`,
{
headers:{
"X-RapidAPI-Key":API_KEY,
"X-RapidAPI-Host":"tiktok-video-no-watermark2.p.rapidapi.com"
}
})

const data = await response.json()

document.getElementById("loading").classList.add("hidden")

// Thumbnail göster
document.getElementById("thumb").src = data.data.cover

// İndirme linki
document.getElementById("downloadBtn").href = data.data.play

document.getElementById("downloadBtn").download = "tiktok-video.mp4"

document.getElementById("result").classList.remove("hidden")

}catch(e){

document.getElementById("loading").classList.add("hidden")
alert("Video alınamadı")

}

}

</script>

</body>
</html>
