<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .tiktok-btn { background: linear-gradient(90deg, #25F4EE 0%, #FE2C55 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-zinc-900 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-zinc-800 text-center">
        <h1 class="text-3xl font-extrabold mb-2 tracking-tighter">TIK<span class="text-[#FE2C55]">TOK</span></h1>
        <p class="text-zinc-400 text-sm mb-8">Filigransız Video İndirici</p>
        
        <input type="text" id="linkInput" placeholder="TikTok linkini buraya yapıştır..." 
            class="w-full p-4 rounded-xl bg-zinc-800 border border-zinc-700 mb-4 focus:outline-none focus:ring-2 focus:ring-[#FE2C55] text-white">
        
        <button onclick="indir()" id="islemBtn" class="w-full tiktok-btn p-4 rounded-xl font-bold text-white hover:scale-105 transition-transform">
            VİDEOYU BUL
        </button>

        <div id="sonuc" class="hidden mt-10 p-4 border border-zinc-700 rounded-2xl bg-black">
            <p class="text-green-400 font-bold mb-4">Video bulundu! ✨</p>
            <a id="downloadLink" href="#" target="_blank" 
                class="block w-full bg-white text-black p-3 rounded-lg font-bold hover:bg-zinc-200">
                ŞİMDİ İNDİR (MP4)
            </a>
        </div>

        <p id="hata" class="hidden text-red-500 mt-4 text-sm font-medium"></p>
    </div>

    <script>
        async function indir() {
            const input = document.getElementById('linkInput').value;
            const btn = document.getElementById('islemBtn');
            const sonucDiv = document.getElementById('sonuc');
            const hataP = document.getElementById('hata');
            const downloadBtn = document.getElementById('downloadLink');

            if (!input) {
                alert("Lütfen bir link yapıştırın!");
                return;
            }

            // Temizlik ve Yükleniyor durumu
            btn.innerText = "Sorgulanıyor...";
            btn.disabled = true;
            sonucDiv.classList.add('hidden');
            hataP.classList.add('hidden');

            try {
                // Herkese açık, KEY istemeyen TikWM servisini kullanıyoruz
                const response = await fetch(`https://www.tikwm.com/api/?url=${input}`);
                const resData = await response.json();
                
                // TikWM başarılı sonuç verirse "code: 0" döndürür
                if (resData.code === 0 && resData.data) {
                    // Yüksek kalite (hdplay) varsa onu al, yoksa normali (play) al
                    const videoUrl = resData.data.hdplay || resData.data.play;
                    
                    downloadBtn.href = videoUrl;
                    sonucDiv.classList.remove('hidden');
                } else {
                    // API videoyu bulamazsa bize mesaj gönderir
                    throw new Error(resData.msg || "Gizli hesap veya yanlış link olabilir.");
                }

            } catch (err) {
                hataP.innerText = "Hata: " + err.message;
                hataP.classList.remove('hidden');
            } finally {
                btn.innerText = "VİDEOYU BUL";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
