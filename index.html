
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Captain Downloader</title>

<style>

body{
background:linear-gradient(135deg,#0f0f0f,#1f1f1f);
font-family:Arial;
text-align:center;
color:white;
padding:30px;
}

h1{
color:#ff0050;
}

.box{

background:#1a1a1a;
padding:25px;
border-radius:15px;
max-width:400px;
margin:auto;
box-shadow:0 0 15px rgba(0,0,0,0.5);

}

input{

width:90%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
font-size:15px;

}

button{

margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff0050;
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{
background:#e00046;
}

video{

margin-top:20px;
border-radius:10px;

}

a button{

background:#00c853;

}

</style>

</head>

<body>

<h1>Captain TikTok Downloader</h1>

<div class="box">

<input id="link" placeholder="TikTok video linkini yapıştır">

<br>

<button onclick="indir()">Videoyu Getir</button>

<div id="sonuc"></div>

</div>

<script>

function indir(){

let link=document.getElementById("link").value

let api="https://tikwm.com/api/?url="+encodeURIComponent(link)

fetch(api)

.then(res=>res.json())

.then(data=>{

let hd=data.data.hdplay || data.data.play

let preview=data.data.play

document.getElementById("sonuc").innerHTML=

`

<video src="${preview}" width="100%" controls></video>

<br>

<a href="${hd}" download>

<button>En Yüksek Kaliteyi İndir</button>

</a>

`

})

}

</script>

</body>
</html>
