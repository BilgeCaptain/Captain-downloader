<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TikTok Downloader</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e1e1e;
padding:30px;
border-radius:15px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#ff0050;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>TikTok Downloader</h2>

<input id="url" placeholder="TikTok linki">

<button onclick="indir()">Video indir</button>

</div>

<script>

function indir(){

let link=document.getElementById("url").value

window.open(
"https://tikwm.com/api/?url="+encodeURIComponent(link)
)

}

</script>

</body>
</html>
