<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Pro Saver</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Inter', -apple-system, sans-serif; 
            overflow: hidden;
        }
        .tiktok-gradient { background: linear-gradient(90deg, #25F4EE 0%, #FE2C55 100%); }
        .insta-gradient { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
        * { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glass p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
        <h1 class="text-4xl font-black mb-1 tracking-tighter italic">TIK<span class="text-[#FE2C55]">TOK</span></h1>
        <p class="text-zinc-500 text-[10px] mb-8 uppercase tracking-[0.3em] font-bold">Pro Video Downloader</p>
        
        <input type="text" id="linkInput" placeholder="Linke basılı tutup yapıştır..." 
            class="w-full p-5 rounded-2xl bg-black/50 border border-white/10 mb-4 focus:outline-none focus:ring-2 focus:ring-[#25F4EE] text-white text-center text-sm transition-all">
        
        <button onclick="indir()" id="islemBtn" class="w-full tiktok-gradient p-5 rounded-2xl font-black text-white shadow-lg active:scale-95 transition-all">
            VİDEOYU HAZIRLA
        </button>

        <div id="sonuc" class="hidden mt-8 animate-in fade-in duration-500">
            <div class="p-4 bg-green-500/10 border border-green-500/20 rounded-2xl mb-4 text-green-400 text-xs font-bold">
                VİDEO BAŞARIYLA YAKALANDI! ✨
            </div>
            
            <a id="downloadLink" href="#" target="_blank" 
                class="block w-full bg-white text-black p-4 rounded-xl font-black active:bg-zinc-300 transition-colors mb-3">
                GALERİYE İNDİR
            </a>
            
            <button onclick="sosyalPaylas()" id="shareBtn" 
                class="insta-gradient w-full p-4 rounded-xl font-black text-white active:scale-95 transition-all flex items-center justify-center gap-2">
                <span>INSTAGRAM'DA PAYLAŞ</span>
            </button>

            <p class="text-zinc-500 text-[10px] mt-6 italic leading-tight">
                iPhone: Video açılırsa "Paylaş > Videoyu Kaydet" deyin.
            </p>
        </div>

        <p id="hata" class="hidden text-red-400 mt-6 text-xs font-bold bg-red-500/10 p-3 rounded-lg"></p>
    </div>

    <script>
        async function indir() {
            const input = document.getElementById('linkInput').value.trim();
            const btn = document.getElementById('islemBtn');
            const sonucDiv = document.getElementById('sonuc');
            const hataP = document.getElementById('hata');
            const downloadBtn = document.getElementById('downloadLink');

            if (!input) return alert("Lütfen bir TikTok linki girin!");

            btn.innerText = "SİSTEME BAĞLANILIYOR...";
            btn.disabled = true;
            sonucDiv.classList.add('hidden');
            hataP.classList.add('hidden');

            try {
                const proxy = "https://corsproxy.io/?"; 
                const targetApi = `https://www.tikwm.com/api/?url=${encodeURIComponent(input)}`;
                
                const response = await fetch(proxy + targetApi);
                const resData = await response.json();
                
                if (resData.code === 0 && resData.data) {
                    const videoUrl = resData.data.hdplay || resData.data.play;
                    downloadBtn.href = videoUrl;
                    sonucDiv.classList.remove('hidden');
                } else {
                    throw new Error("Video bulunamadı. Gizli hesap olabilir.");
                }
            } catch (err) {
                hataP.innerText = "HATA: " + err.message;
                hataP.classList.remove('hidden');
            } finally {
                btn.innerText = "VİDEOYU HAZIRLA";
                btn.disabled = false;
            }
        }

        async function sosyalPaylas() {
            const videoUrl = document.getElementById('downloadLink').href;
            const shareBtn = document.getElementById('shareBtn');
            const originalText = shareBtn.innerHTML;

            try {
                shareBtn.innerHTML = "<span>DOSYA HAZIRLANIYOR...</span>";
                shareBtn.disabled = true;

                // 1. Videoyu blob olarak indir (Paylaşım için dosya lazım)
                const response = await fetch(videoUrl);
                const blob = await response.blob();
                const file = new File([blob], "tiktok_video.mp4", { type: "video/mp4" });

                // 2. İşletim sistemi paylaşım menüsünü aç (Instagram/Reels burada çıkar)
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'TikTok Videosu',
                        text: 'Instagram DM veya Reels üzerinden paylaş!'
                    });
                } else {
                    // PC veya desteklemeyen cihazlar için fallback
                    window.open("https://www.instagram.com/reels/create/", "_blank");
                }
            } catch (err) {
                console.error("Paylaşım hatası:", err);
                alert("Paylaşım başarısız oldu. Lütfen önce videoyu indirin.");
            } finally {
                shareBtn.innerHTML = originalText;
                shareBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
