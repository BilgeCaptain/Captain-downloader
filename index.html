<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Captain Video Downloader</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        body { 
            background: #001220; 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
        }
        /* Kaptan Temalı Altın ve Lacivert Geçişi */
        .captain-gradient { background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%); }
        .captain-bg { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 215, 0, 0.2); }
        .loader { border: 2px solid #fff; border-top: 2px solid #FFD700; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="captain-bg p-8 rounded-[3rem] w-full max-w-sm text-center shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
        <div class="mb-6">
            <div class="text-4xl mb-2">⚓</div>
            <h1 class="text-2xl font-black tracking-tight leading-tight">CAPTAIN<br><span class="text-[#FFD700]">DOWNLOADER</span></h1>
        </div>

        <input type="text" id="linkInput" placeholder="TikTok Linkini Dümenle..." 
            class="w-full p-4 rounded-2xl bg-black/40 border border-yellow-600/30 mb-4 focus:outline-none focus:ring-2 focus:ring-[#FFD700] text-white text-center text-sm transition-all placeholder:text-zinc-600">
        
        <button onclick="indir()" id="islemBtn" class="w-full captain-gradient p-5 rounded-2xl font-black text-[#001220] shadow-lg active:scale-95 transition-all uppercase tracking-tighter">
            VİDEOYU YAKALA
        </button>

        <div id="sonuc" class="hidden mt-8 animate-in slide-in-from-bottom duration-500">
            <div class="flex items-center justify-center gap-2 text-[#FFD700] text-[10px] font-bold uppercase mb-4 tracking-[0.2em]">
                <span class="h-[1px] w-8 bg-yellow-600/50"></span>
                Ganimet Hazır
                <span class="h-[1px] w-8 bg-yellow-600/50"></span>
            </div>
            
            <button onclick="reelsPaylas()" id="shareBtn" 
                class="w-full bg-white text-black p-5 rounded-2xl font-black active:scale-95 transition-all shadow-xl flex items-center justify-center gap-2 mb-3">
                🎬 REELS OLARAK PAYLAŞ
            </button>

            <a id="downloadLink" href="#" target="_blank" 
                class="block w-full text-zinc-500 p-2 text-[10px] font-bold uppercase tracking-widest hover:text-white transition">
                Dosyayı Cihaza İndir
            </a>
        </div>

        <p id="hata" class="hidden text-red-400 mt-6 text-[11px] font-bold bg-red-900/20 p-3 rounded-xl"></p>
        <div id="status" class="hidden mt-4 text-[#FFD700] text-[10px] font-bold uppercase tracking-widest opacity-70"></div>
    </div>

    <script>
        let cachedVideoUrl = "";

        async function indir() {
            const input = document.getElementById('linkInput').value.trim();
            const btn = document.getElementById('islemBtn');
            const status = document.getElementById('status');
            const sonuc = document.getElementById('sonuc');
            const hata = document.getElementById('hata');

            if (!input) return alert("Kaptan, önce bir link vermen lazım!");

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>ARANIYOR...';
            status.classList.remove('hidden');
            status.innerText = "Ağlar Atılıyor...";
            sonuc.classList.add('hidden');
            hata.classList.add('hidden');

            try {
                // Hızlı ve stabil bir proxy
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.tikwm.com/api/?url=' + input)}`);
                const data = await res.json();
                const resData = JSON.parse(data.contents);

                if (resData.code === 0) {
                    cachedVideoUrl = resData.data.hdplay || resData.data.play;
                    document.getElementById('downloadLink').href = cachedVideoUrl;
                    sonuc.classList.remove('hidden');
                    status.innerText = "Video Güvertede!";
                } else {
                    throw new Error("Video bulunamadı. Gizli hesap olabilir.");
                }
            } catch (err) {
                hata.innerText = "BİR SORUN VAR: " + err.message;
                hata.classList.remove('hidden');
                status.classList.add('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "VİDEOYU YAKALA";
            }
        }

        async function reelsPaylas() {
            const shareBtn = document.getElementById('shareBtn');
            const status = document.getElementById('status');
            
            try {
                shareBtn.disabled = true;
                shareBtn.innerHTML = "<span>HAZIRLANIYOR...</span>";
                status.innerText = "Ganimet Paketleiniyor...";

                const response = await fetch(cachedVideoUrl);
                const blob = await response.blob();
                const file = new File([blob], "captain_video.mp4", { type: "video/mp4" });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ 
                        files: [file],
                        title: 'Captain Downloader'
                    });
                } else {
                    alert("Bu cihaz doğrudan paylaşımı desteklemiyor. Lütfen indir butonunu kullanın.");
                }
            } catch (e) {
                alert("Paylaşım sırasında bir fırtına çıktı! Önce indirmeyi deneyin.");
            } finally {
                shareBtn.disabled = false;
                shareBtn.innerHTML = "🎬 REELS OLARAK PAYLAŞ";
                status.innerText = "";
            }
        }
    </script>
</body>
</html>
