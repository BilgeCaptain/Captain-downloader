<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cihaz Marka & Model Tespiti</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #0f172a;
            color: #f8fafc;
        }
        .card {
            text-align: center;
            padding: 3rem 2rem;
            border-radius: 24px;
            background: #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid #334155;
            width: 90%;
            max-width: 450px;
        }
        .label {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }
        .device-info {
            font-size: 2rem;
            font-weight: 800;
            color: #38bdf8;
            line-height: 1.2;
        }
        .sub-info {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #64748b;
            font-family: monospace;
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="label">Tespit Edilen Cihaz</div>
        <div id="display" class="device-info">Analiz ediliyor...</div>
        <div class="sub-info" id="raw-ua"></div>
    </div>

    <script>
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            const display = document.getElementById('display');
            const rawUa = document.getElementById('raw-ua');
            
            let brand = "Bilinmeyen";
            let model = "";

            // Marka ve Model Ayıklama Mantığı
            if (/iPhone|iPad|iPod/i.test(ua)) {
                brand = "Apple";
                // Apple modellerini tarayıcıdan tam olarak çekmek (iPhone 15 vs) 
                // gizlilik nedeniyle imkansızdır, sadece cihaz tipini verir.
                model = ua.match(/iPhone|iPad|iPod/i)[0];
            } 
            else if (/Android/i.test(ua)) {
                // Android'de parantez içindeki model kodunu yakalamaya çalışır
                const match = ua.match(/Android.*;\s([^;]+)\sBuild/i) || ua.match(/Android.*;\s([^;]+);/i);
                if (match && match[1]) {
                    model = match[1].trim();
                }

                if (/Samsung|SM-|GT-/i.test(ua)) brand = "Samsung";
                else if (/Xiaomi|Redmi|POCO|Mi /i.test(ua)) brand = "Xiaomi";
                else if (/Huawei|HUAWEI|Honor/i.test(ua)) brand = "Huawei";
                else if (/Oppo|CPH/i.test(ua)) brand = "Oppo";
                else if (/Vivo/i.test(ua)) brand = "Vivo";
                else brand = "Android Cihaz";
            }
            else if (/Windows NT/i.test(ua)) {
                brand = "Windows";
                model = "PC / Laptop";
            }
            else if (/Macintosh/i.test(ua)) {
                brand = "Apple";
                model = "Macbook / iMac";
            }

            // Ekrana Yazdır
            display.innerText = `${brand} ${model}`.trim();
            rawUa.innerText = "Sistem Verisi: " + ua;
        }

        window.onload = getDeviceInfo;
    </script>
</body>
</html>
