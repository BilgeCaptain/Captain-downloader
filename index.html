<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Captain TikTok Downloader</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#1f1f1f);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.app{

width:380px;
background:#121212;
padding:30px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
text-align:center;

}

h1{
color:#ff0050;
}

input{

width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:15px;
font-size:15px;

}

button{

width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#ff0050;
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{
background:#e00046;
}

video{

width:100%;
border-radius:12px;
margin-top:15px;

}

.download{

background:#00c853;

}

.download:hover{

background:#00b248;

}

.audio{

background:#2196f3;

}

</style>

</head>

<body>

<div class="app">

<h1>Captain Downloader</h1>

<p>TikTok video linkini yapıştır</p>

<input id="link" placeholder="https://www.tiktok.com/...">

<button onclick="getVideo()">Videoyu Getir</button>

<div id="result"></div>

</div>

<script>

function getVideo(){

let link=document.getElementById("link").value

let api="https://tikwm.com/api/?url="+encodeURIComponent(link)

fetch(api)

.then(res=>res.json())

.then(data=>{

if(!data.data){

alert("Video bulunamadı")

return

}

let video=data.data.hdplay || data.data.play

let audio=data.data.music

document.getElementById("result").innerHTML=

`

<video src="${video}" controls></video>

<a href="${video}" download="tiktok-video.mp4">

<button class="download">MP4 Video İndir</button>

</a>

<a href="${audio}" download="tiktok-audio.mp3">

<button class="audio">MP3 Ses İndir</button>

</a>

`

})

}

</script>

</body>
</html>
