<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Reels Saver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; }
        .reels-btn { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 2px solid #fff; border-top: 2px solid transparent; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
        <h1 class="text-3xl font-black mb-2 italic tracking-tighter">REELS<span class="text-[#FE2C55]">PRO</span></h1>
        <p class="text-zinc-500 text-[10px] mb-8 uppercase tracking-widest font-bold">Sayfanda Paylaşmaya Hazır</p>
        
        <input type="text" id="linkInput" placeholder="TikTok linkini yapıştır..." 
            class="w-full p-4 rounded-xl bg-zinc-900 border border-white/10 mb-4 focus:outline-none focus:ring-1 focus:ring-[#25F4EE] text-white text-center">
        
        <button onclick="indir()" id="islemBtn" class="w-full bg-white text-black p-4 rounded-xl font-black transition-all active:scale-95 shadow-lg">
            VİDEOYU YAKALA
        </button>

        <div id="sonuc" class="hidden mt-6 space-y-3">
            <div class="text-green-400 text-xs font-bold mb-2 uppercase animate-pulse">Video Hazır! ✨</div>
            
            <button onclick="reelsPaylas()" id="shareBtn" 
                class="reels-btn w-full p-5 rounded-2xl font-black text-white active:scale-95 transition-all shadow-xl">
                REELS OLARAK PAYLAŞ
            </button>

            <a id="downloadLink" href="#" target="_blank" 
                class="block w-full text-zinc-400 p-2 text-xs underline decoration-zinc-700">
                Alternatif: Galeriye Kaydet
            </a>
        </div>

        <p id="hata" class="hidden text-red-500 mt-4 text-[11px] font-bold"></p>
        <div id="status" class="hidden mt-4 text-zinc-500 text-[10px] uppercase font-bold tracking-tighter"></div>
    </div>

    <script>
        let cachedVideoUrl = "";

        async function indir() {
            const input = document.getElementById('linkInput').value.trim();
            const btn = document.getElementById('islemBtn');
            const status = document.getElementById('status');
            const sonuc = document.getElementById('sonuc');

            if (!input) return alert("Link gerekli!");

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>ARANIYOR...';
            status.classList.remove('hidden');
            status.innerText = "Sunucuya bağlanılıyor...";

            try {
                // Hızlı Proxy Kullanımı
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.tikwm.com/api/?url=' + input)}`);
                const data = await res.json();
                const resData = JSON.parse(data.contents);

                if (resData.code === 0) {
                    cachedVideoUrl = resData.data.hdplay || resData.data.play;
                    document.getElementById('downloadLink').href = cachedVideoUrl;
                    sonuc.classList.remove('hidden');
                    status.innerText = "Video bulundu!";
                } else {
                    throw new Error("Video bulunamadı.");
                }
            } catch (err) {
                document.getElementById('hata').innerText = "Hata: " + err.message;
                document.getElementById('hata').classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "VİDEOYU YAKALA";
            }
        }

        async function reelsPaylas() {
            const shareBtn = document.getElementById('shareBtn');
            const status = document.getElementById('status');
            
            try {
                shareBtn.disabled = true;
                shareBtn.innerHTML = "<span>HAZIRLANIYOR...</span>";
                status.innerText = "Video Reels için paketleniyor...";

                const response = await fetch(cachedVideoUrl);
                const blob = await response.blob();
                const file = new File([blob], "video.mp4", { type: "video/mp4" });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    // Bu işlem telefonun paylaşma menüsünü açar
                    await navigator.share({ 
                        files: [file],
                        title: 'TikTok Video'
                    });
                } else {
                    alert("Cihazınız doğrudan paylaşımı desteklemiyor. Lütfen önce galeriye kaydedin.");
                }
            } catch (e) {
                alert("İşlem başarısız. Lütfen önce videoyu galeriye kaydedin.");
            } finally {
                shareBtn.disabled = false;
                shareBtn.innerText = "REELS OLARAK PAYLAŞ";
                status.innerText = "";
            }
        }
    </script>
</body>
</html>
