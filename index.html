<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Captain TikTok Downloader</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e1e1e;
padding:30px;
border-radius:15px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#ff0050;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

video{
width:100%;
margin-top:20px;
border-radius:10px;
}

.download{
background:#00c853;
}

</style>

</head>

<body>

<div class="box">

<h2>Captain TikTok Downloader</h2>

<input id="url" placeholder="TikTok linki yapıştır">

<button onclick="indir()">Videoyu Getir</button>

<div id="sonuc"></div>

</div>

<script>

async function indir(){

let link=document.getElementById("url").value

let api="https://tikwm.com/api/?url="+encodeURIComponent(link)

let res=await fetch(api)
let data=await res.json()

let video=data.data.hdplay || data.data.play

document.getElementById("sonuc").innerHTML=

`

<video controls src="${video}"></video>

<a href="${video}" download="captain-tiktok.mp4">
<button class="download">MP4 Filigransız İndir</button>
</a>

`

}

</script>

</body>
</html>
