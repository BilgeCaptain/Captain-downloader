
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Captain Downloader</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#1a1a1a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{

background:#121212;
padding:30px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.7);

}

h1{

color:#ff0050;
margin-bottom:20px;

}

input{

width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
margin-bottom:15px;

}

button{

width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#ff0050;
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{

background:#e00046;

}

video{

margin-top:20px;
width:100%;
border-radius:12px;

}

.download{

background:#00c853;
margin-top:10px;

}

</style>

</head>

<body>

<div class="container">

<h1>Captain Downloader</h1>

<input id="link" placeholder="TikTok video linki yapıştır">

<button onclick="indir()">Videoyu Getir</button>

<div id="sonuc"></div>

</div>

<script>

function indir(){

let link=document.getElementById("link").value

let api="https://tikwm.com/api/?url="+encodeURIComponent(link)

fetch(api)

.then(res=>res.json())

.then(data=>{

let video=data.data.hdplay || data.data.play

document.getElementById("sonuc").innerHTML=

`

<video src="${video}" controls></video>

<a href="${video}" download="tiktok-video.mp4">

<button class="download">MP4 İndir (En Yüksek Kalite)</button>

</a>

`

})

}

</script>

</body>
</html>
