<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cihaz Tespiti</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #121212;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 20px;
            background: #1e1e1e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            width: 80%;
            max-width: 400px;
        }
        h1 {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 0.5rem;
        }
        .brand {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .details {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Kullandığınız Cihaz</h1>
        <div id="device-brand" class="brand">Tespit ediliyor...</div>
        <div class="details" id="user-agent"></div>
    </div>

    <script>
        function detectDevice() {
            const ua = navigator.userAgent;
            const brandElement = document.getElementById('device-brand');
            let brand = "Bilinmeyen Cihaz";

            // Marka Kontrolleri
            if (/iPhone|iPad|iPod/i.test(ua)) {
                brand = "Apple (iPhone/iPad)";
            } else if (/Samsung|SM-|GT-/i.test(ua)) {
                brand = "Samsung";
            } else if (/Huawei|HUAWEI|Honor/i.test(ua)) {
                brand = "Huawei";
            } else if (/Xiaomi|Redmi|Mi |POCO/i.test(ua)) {
                brand = "Xiaomi";
            } else if (/Oppo|CPH|PCLM/i.test(ua)) {
                brand = "Oppo";
            } else if (/Vivo/i.test(ua)) {
                brand = "Vivo";
            } else if (/Pixel/i.test(ua)) {
                brand = "Google Pixel";
            } else if (/Android/i.test(ua)) {
                brand = "Android Cihaz";
            } else if (/Windows/i.test(ua)) {
                brand = "Bilgisayar (Windows)";
            } else if (/Macintosh/i.test(ua)) {
                brand = "Bilgisayar (Mac)";
            }

            brandElement.innerText = brand;
            
            // Teknik detay meraklıları için küçük not
            console.log("User Agent:", ua);
        }

        // Sayfa yüklendiğinde çalıştır
        window.onload = detectDevice;
    </script>
</body>
</html>
