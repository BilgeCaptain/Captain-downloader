<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Captain Video Downloader</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        body { background: #001220; color: #fff; font-family: 'Poppins', sans-serif; }
        .captain-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 215, 0, 0.2); }
        .captain-btn { background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%); color: #001220; }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="captain-card p-8 rounded-[3rem] w-full max-w-md text-center">
        <div class="mb-6 text-center">
            <div class="text-4xl mb-2">⚓</div>
            <h1 class="text-3xl font-black mb-1 tracking-tighter italic uppercase leading-none">CAPTAIN<br><span class="text-[#FFD700]">DOWNLOADER</span></h1>
            <p id="statusTxt" class="text-zinc-500 text-[10px] mb-4 uppercase tracking-[0.2em] font-bold italic">Turbo Mode V3</p>
        </div>
        
        <input type="text" id="linkInput" placeholder="Linke basılı tutup yapıştır..." 
            class="w-full p-5 rounded-2xl bg-black/40 border border-white/5 mb-4 focus:outline-none focus:ring-2 focus:ring-[#FFD700] text-white text-center text-base">
        
        <button onclick="indir()" id="islemBtn" class="w-full captain-btn p-5 rounded-2xl font-black shadow-lg active:scale-95 transition-all uppercase tracking-tight">
            VİDEOYU YAKALA
        </button>

        <div id="sonuc" class="hidden mt-8 p-6 border border-yellow-600/20 rounded-3xl bg-black/60">
            <p class="text-[#FFD700] font-bold mb-4 uppercase tracking-widest text-xs">Ganimet Hazır! ✨</p>
            <a id="downloadLink" href="#" target="_blank" 
                class="block w-full bg-white text-black p-4 rounded-xl font-black active:bg-zinc-300 transition-colors">
                İNDİR / İZLE
            </a>
        </div>

        <p id="hata" class="hidden text-red-400 mt-6 text-sm font-bold bg-red-900/20 p-3 rounded-xl"></p>
    </div>

    <script>
        async function indir() {
            const input = document.getElementById('linkInput').value.trim();
            const btn = document.getElementById('islemBtn');
            const sonucDiv = document.getElementById('sonuc');
            const hataP = document.getElementById('hata');
            const downloadBtn = document.getElementById('downloadLink');

            if (!input) return alert("Link gerekli!");

            btn.innerText = "YOL ALINIYOR...";
            btn.disabled = true;
            sonucDiv.classList.add('hidden');
            hataP.classList.add('hidden');

            try {
                // EN HIZLI PROXY DENEMESİ (ThingProxy veya AllOrigins raw olmadan)
                // Bu sefer farklı bir yapı deniyoruz:
                const proxy = "https://api.allorigins.win/get?url="; 
                const targetApi = `https://www.tikwm.com/api/?url=${encodeURIComponent(input)}`;
                
                const response = await fetch(proxy + encodeURIComponent(targetApi));
                const data = await response.json();
                
                // Allorigins JSON döndürdüğü için içindeki contents'i parse ediyoruz
                const resData = JSON.parse(data.contents);
                
                if (resData.code === 0 && resData.data) {
                    const videoUrl = resData.data.hdplay || resData.data.play;
                    downloadBtn.href = videoUrl;
                    sonucDiv.classList.remove('hidden');
                } else {
                    throw new Error("Video bulunamadı.");
                }
            } catch (err) {
                hataP.innerText = "HATA: Sunucu yavaş, lütfen tekrar deneyin.";
                hataP.classList.remove('hidden');
            } finally {
                btn.innerText = "VİDEOYU YAKALA";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
